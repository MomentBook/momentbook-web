name: SEO Audit

on:
  pull_request:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_IOS_APP_ID: "1234567890"
      NEXT_PUBLIC_IOS_STORE_PATH: app/momentbook/id1234567890
      NEXT_PUBLIC_ANDROID_APP_ID: app.momentbook
      NEXT_PUBLIC_SUPPORT_EMAIL: support@example.com
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: yarn lint

      - name: Run Baseline SEO Audit
        if: ${{ env.NEXT_PUBLIC_API_BASE_URL == '' }}
        run: yarn seo:audit:build -- --no-sitemap-samples

      - name: Run Sitemap Detail SEO Audit
        if: ${{ env.NEXT_PUBLIC_API_BASE_URL != '' }}
        run: yarn seo:audit:build
